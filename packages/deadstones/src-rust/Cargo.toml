[package]
name = "deadstones"
version = "0.1.0"
authors = ["Kaya Team"]
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

# Deny all warnings to enforce clean builds
[lints.rust]
unused = "deny"

[profile.release]
opt-level = "s"
lto = true
